name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate Polished Contribution Snake
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_snake_svg.py --github-user "${{ github.repository_owner }}" --theme light --output dist/github-contribution-grid-snake.svg
          python scripts/generate_snake_svg.py --github-user "${{ github.repository_owner }}" --theme dark --output dist/github-contribution-grid-snake-dark.svg

      - name: Publish to output branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_dir="output-branch"

          if git ls-remote --exit-code --heads origin output; then
            git worktree add -B output "$publish_dir" origin/output
          else
            git worktree add --detach "$publish_dir"
            (
              cd "$publish_dir"
              git checkout --orphan output
              git rm -rf . >/dev/null 2>&1 || true
              find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            )
          fi

          find "$publish_dir" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R dist/. "$publish_dir"/
          touch "$publish_dir/.nojekyll"

          (
            cd "$publish_dir"
            git add --all

            if git diff --cached --quiet; then
              echo "No changes to publish"
              exit 0
            fi

            git commit -m "chore: update snake animation"
            git push origin output
          )
